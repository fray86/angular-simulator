<header class="header">
  <div class="container super-header">
    <div class="logo">
      <a href="/">
        <img src="/images/main-logo.svg" alt="Румтибет логотип">
      </a>
    </div>
    <nav class="nav-items">
      <ul class="nav-list">
        <li class="nav-item"><a href="#main">Главная</a></li>
        <li class="nav-item"><a href="#guide">Про гида</a></li>
        <li class="nav-item"><a href="#program">Программа тура</a></li>
        <li class="nav-item"><a href="#price">Стоимость</a></li>
        <li class="nav-item"><a href="#blog">Блог</a></li>
        <li class="nav-item"><a href="#contacts">Контакты</a></li>
      </ul>
    </nav>
    <button type="button" class="consult-btn btn-general">
      Консультация
    </button>
  </div>
</header>
<main class="main-section">
  <section class="container main-container">
    <h1 class="main-tittle fw-regular">
      Насладись прогулкой в горах <br>
       с командой единомышленников
    </h1>
    <div class="select-programm-container">
      <div class="form-group">
        <button class="drop-btn">
          <span>Локация для тура</span>
          <img src="/images/arrow-icon.svg" alt="Стрелка вниз" class="field-icon">
        </button>
        <span class="field-hint fw-regular">
          выберите из списка
        </span>
      </div>
      <div class="form-group">
        <button class="drop-btn">
          <span>Дата похода</span>
          <img src="/images/date-icon.svg" alt="Иконка с датой" class="field-icon">
        </button>
        <span class="field-hint fw-regular">
          укажите дату
        </span>
      </div>
      <div class="form-group">
        <button class="drop-btn">
        <span>Участники</span>
        <img src="/images/arrow-icon.svg" alt="Стрелка вниз" class="field-icon">
        </button>
        <span class="field-hint fw-regular">
          выберите из списка
        </span>
      </div>
      <button class="btn-general btn-search-programm">Найти программу</button>
    </div>
  </section>
</main>
